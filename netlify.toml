# Netlify Configuration for VishwaGuru Frontend

[build]
  # Execute from root, explicit paths
  publish = "frontend/dist"
  command = "cd frontend && rm -f package-lock.json && npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"

# Redirects for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
