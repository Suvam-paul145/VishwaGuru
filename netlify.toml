# Netlify Configuration for VishwaGuru Frontend

[build]
  # Netlify will change directory to "frontend" before running commands
  base = "frontend"
  # Publish directory relative to "base"
  publish = "dist"
  # Command relative to "base"
  command = "npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"
  CI = "false"
  # NODE_ENV is set to "production" by default on Netlify

# Redirects for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
